name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Single macOS job — electron-builder builds both arm64 and x64 on the
  # arm64 runner. It calls @electron/rebuild internally for each arch, so
  # cross-compilation of native modules (better-sqlite3, node-pty) is handled
  # automatically. Running two jobs caused a 422 race condition because both
  # jobs built all configured arches and tried to upload the same files.
  release-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install setuptools (for node-gyp / Python 3.12+)
        run: pip3 install setuptools --break-system-packages

      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Build and publish Electron app (arm64 + x64)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always

  release-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install setuptools (for node-gyp / Python 3.12+)
        run: pip install setuptools

      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

  release-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install setuptools (for node-gyp / Python 3.12+)
        run: pip3 install setuptools --break-system-packages

      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish always

  publish-release:
    runs-on: ubuntu-latest
    needs: [release-mac, release-windows, release-linux]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add changelog and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          gh release edit "${{ github.ref_name }}" \
            --title "$VERSION" \
            --notes "$NOTES" \
            --draft=false
