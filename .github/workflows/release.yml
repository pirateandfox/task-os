name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # arm64 DMG — built natively on Apple Silicon runner
  release-mac-arm64:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install setuptools (for node-gyp / Python 3.12+)
        run: pip3 install setuptools --break-system-packages

      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Build and publish Electron app (arm64)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --arm64 --publish always

  # x64 DMG — cross-compiled on the arm64 runner using Clang's x86_64 target.
  # macos-13 (the last Intel GitHub runner) was retired, so we cross-compile:
  # 1. npm ci triggers postinstall which rebuilds native modules for arm64 (host)
  # 2. electron-rebuild --arch x64 re-compiles better-sqlite3 + node-pty for x64
  # 3. electron-builder --x64 packages the x64 native modules into the DMG
  release-mac-x64:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install setuptools (for node-gyp / Python 3.12+)
        run: pip3 install setuptools --break-system-packages

      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Rebuild native modules for x64
        run: npx electron-rebuild --arch x64 --force

      - name: Build UI
        run: npm run build --prefix ui

      - name: Build and publish Electron app (x64)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --x64 --publish always

  release-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install setuptools (for node-gyp / Python 3.12+)
        run: pip install setuptools

      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

  release-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install setuptools (for node-gyp / Python 3.12+)
        run: pip3 install setuptools --break-system-packages

      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish always

  publish-release:
    runs-on: ubuntu-latest
    needs: [release-mac-arm64, release-mac-x64, release-windows, release-linux]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add changelog and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          gh release edit "${{ github.ref_name }}" \
            --title "$VERSION" \
            --notes "$NOTES" \
            --draft=false
