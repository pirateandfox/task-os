appId: com.justinhandley.taskos
productName: Task OS
copyright: Copyright © 2026 Justin Handley

directories:
  output: dist
  buildResources: assets

files:
  - electron-main.js
  - preload.cjs
  - api-entry.cjs
  - api.js
  - s3.js
  - mcp/**/*
  - ui/dist/**/*
  - "!ui/src/**/*"
  - "!ui/node_modules/**/*"
  - "!db/**/*"
  - "!node_modules/.cache/**/*"
  - "!**/*.map"
  - "!**/*.md"
  - "!assets/build-icon.mjs"

# Backend JS files must be outside the asar so ESM dynamic imports resolve correctly
# (Electron patches require() for asar but NOT ESM import())
asarUnpack:
  - api-entry.cjs
  - api.js
  - s3.js
  - mcp/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/node-pty/**/*

mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

dmg:
  title: Task OS
  sign: false

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
        - arm64

publish:
  provider: github
  owner: pirateandfox
  repo: task-os
  releaseType: release

afterSign: scripts/notarize.mjs
